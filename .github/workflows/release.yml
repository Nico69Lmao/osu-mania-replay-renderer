name: Build release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing version tag to publish
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          python -m pip install uv
          uv sync --locked
          uv pip install pyinstaller
      - name: Build executable
        shell: pwsh
        run: |
          $version = "$env:RELEASE_TAG".TrimStart("v")
          uv run pyinstaller --noconfirm --clean --onefile --windowed `
            --name osu-mania-replay-renderer `
            --paths src `
            --collect-all imageio_ffmpeg `
            --copy-metadata osrparse `
            src/osu_mania_replay_renderer/__main__.py
          Move-Item dist/osu-mania-replay-renderer.exe "dist/osu-mania-replay-renderer-$version-Windows-x86_64.exe"
          $process = Start-Process `
            -FilePath "dist/osu-mania-replay-renderer-$version-Windows-x86_64.exe" `
            -ArgumentList "--multiprocessing-smoke-test" `
            -Wait -PassThru
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/*-Windows-x86_64.exe

  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          python -m pip install uv
          uv sync --locked
          uv pip install pyinstaller
      - name: Build application
        run: |
          uv run pyinstaller --noconfirm --clean --onedir --windowed \
            --name osu-mania-replay-renderer \
            --paths src \
            --collect-all imageio_ffmpeg \
            --copy-metadata osrparse \
            src/osu_mania_replay_renderer/__main__.py
      - name: Test frozen multiprocessing
        run: dist/osu-mania-replay-renderer/osu-mania-replay-renderer --multiprocessing-smoke-test
      - name: Build AppImage
        run: |
          version="${RELEASE_TAG#v}"
          mkdir -p AppDir/usr/bin
          cp -a dist/osu-mania-replay-renderer/. AppDir/usr/bin/
          cp packaging/linux/AppRun AppDir/AppRun
          cp packaging/linux/osu-mania-replay-renderer.desktop AppDir/
          cp packaging/linux/osu-mania-replay-renderer.svg AppDir/
          chmod +x AppDir/AppRun AppDir/usr/bin/osu-mania-replay-renderer
          curl -L --fail --retry 3 \
            -o appimagetool.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool.AppImage AppDir \
            "osu-mania-replay-renderer-$version-Linux-x86_64.AppImage"
          APPIMAGE_EXTRACT_AND_RUN=1 \
            "./osu-mania-replay-renderer-$version-Linux-x86_64.AppImage" \
            --multiprocessing-smoke-test
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: '*-Linux-x86_64.AppImage'

  publish:
    needs: [windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$RELEASE_TAG" artifacts/* --verify-tag --generate-notes
